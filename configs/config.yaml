storage:
  base_dir: "data"
  library_dir: "data/library/papers"
  cache_raw_dir: "data/cache/raw"
  cache_embeddings_dir: "data/cache/embeddings"
  db_path: "db/app.sqlite"

embedding:
  backend: "sentence-transformers"
  model: "all-MiniLM-L6-v2"
  dimension: 384
  # For OpenAI (future):
  # backend: "openai"
  # model: "text-embedding-3-small"
  # api_key_env: "OPENAI_API_KEY"

indexing:
  bm25_backend: "fts5"  # "fts5" or "whoosh"
  faiss_index_path: "data/cache/embeddings/faiss.index"
  faiss_id_map_path: "data/cache/embeddings/faiss_ids.json"
  faiss_chunk_index_path: "data/cache/embeddings/faiss_chunks.index"
  faiss_chunk_id_map_path: "data/cache/embeddings/faiss_chunks_ids.json"

chunking:
  target_size: 1000
  overlap: 150

download:
  max_workers: 4
  sleep_sec: 1.0
  timeout: 60
  user_agent: "ResearchIntelligence/0.5"

external:
  openalex:
    enabled: true
    email: ""  # polite pool
  semantic_scholar:
    enabled: true
    api_key: ""  # optional, for higher rate limits
  enrich:
    match_threshold: 0.85
    sleep_sec: 1.0

web:
  host: "0.0.0.0"
  port: 8502

search:
  default_top_k: 20
  bm25_weight: 0.5
  vector_weight: 0.5

watch:
  arxiv:
    sleep_sec: 3.0
    max_results: 100
  openalex:
    sleep_sec: 1.0
    max_results: 100

sync:
  enable: true
  default_since_days: 7
  run_recommend: true
  output_dir: "data/cache/sync"
  actions:
    mode: "digest-only"  # digest-only or apply

notes:
  template_path: "configs/note_template.md"

analytics:
  default_clusters: 5

# GPU analysis settings (only used when CUDA is available)
# On CPU-only machines (e.g., Mac), all gpu settings are ignored gracefully.
gpu:
  enabled: auto  # auto (detect CUDA) / true / false

  embedding:
    model: BAAI/bge-m3        # multilingual high-quality embedding
    batch_size: 256
    # Alternative: Qwen/Qwen3-Embedding-8B

  llm:
    backend: vllm             # vllm / transformers / openai / none
    model: Qwen/Qwen2.5-32B-Instruct
    tensor_parallel: 2        # number of GPUs for tensor parallelism
    max_model_len: 8192
    temperature: 0.1
    max_new_tokens: 512
    # For quantization with transformers backend:
    # load_in_8bit: true
    # load_in_4bit: false
    # For OpenAI-compatible server:
    # backend: openai
    # api_base: http://localhost:8000/v1
    # api_key: EMPTY
